name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # No registry-url here: setup-node would write an .npmrc authToken
      # placeholder, which makes the publish send a dummy token instead of
      # attempting the OIDC exchange.
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Update npm CLI
        run: npm install -g npm@latest

      # Auth via npm Trusted Publishing (OIDC) — no NPM_TOKEN needed. The
      # trusted publisher for this repo/workflow is configured on npmjs.com.
      # Skips when the version is already on the registry so tag re-runs
      # stay idempotent. prepublishOnly runs check + build via pnpm.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "eurlex-mcp-server@$VERSION" version > /dev/null 2>&1; then
            echo "eurlex-mcp-server@$VERSION already published — skipping"
            exit 0
          fi
          npm publish --provenance --access public

  build-image:
    name: Build and push image
    needs: release
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-central-1
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: honeyfield/eurlex-mcp
    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Compute version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPO:$VERSION" \
            -t "$ECR_REGISTRY/$ECR_REPO:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPO:$VERSION"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest"

  deploy-gateway:
    name: Deploy
    needs: build-image
    uses: ./.github/workflows/deploy.yml
    with:
      image_tag: ${{ needs.build-image.outputs.version }}
    secrets: inherit
